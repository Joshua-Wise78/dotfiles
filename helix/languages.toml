[[language]]
name = "python"
auto-format = true
formatter = { command = "autopep8", args = ["--max-line-length", "80", "-"] }

[[language]]
name = "go"
auto-format = true
roots = ["go.mod"]

[[language]]
name = "java"
auto-format = true
language-servers = [ "jdtls" ]

[[language]]
name = "typescript"
auto-format = true

[[language]]
name = "astro"
auto-format = true
roots = ["package.json", "astro.config.mjs"]
language-servers = ["astro-ls", "tailwindcss-ls"]
formatter = { command = "prettier", args = ["--plugin=prettier-plugin-astro", "--parser=astro"] }

[[language]]
name = "yaml"
auto-format = true

[[language]]
name = "dockerfile"
auto-format = true
